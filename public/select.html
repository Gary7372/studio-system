<!DOCTYPE html>
<html class="bg-zinc-950 text-white min-h-screen">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOUR GALLERY | GULUGULU</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="p-4 md:p-10 pb-32">
    
    <div id="main-view" class="max-w-7xl mx-auto">
        
        <div class="mb-6 text-center md:text-left">
            <span class="inline-block text-xl md:text-2xl font-black tracking-[0.3em] text-white border-2 md:border-4 border-white px-4 py-1.5 uppercase">GULUGULU</span>
        </div>

        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 border-b border-zinc-800 pb-8 gap-6">
            <h1 id="cn" class="font-black italic text-4xl md:text-5xl tracking-tighter w-full text-center md:text-left break-words">CLIENT GALLERY</h1>
            
            <div class="flex flex-col w-full md:w-auto items-stretch md:items-end gap-4">
                <div id="counter-box" class="bg-zinc-900 border border-zinc-800 px-5 py-4 md:py-2.5 rounded-xl text-base md:text-sm font-mono shadow-inner text-center transition-opacity">
                    Selected: <span id="sel-count" class="font-bold text-white text-xl md:text-lg">0</span> <span class="text-zinc-500">/</span> <span id="sel-limit" class="text-zinc-400 text-lg md:text-base">0</span>
                </div>
                
                <div class="flex gap-2 bg-zinc-900 p-1.5 md:p-1 rounded-xl border border-zinc-800 w-full md:w-auto">
                    <button onclick="switchTab('raw')" id="rb" class="flex-1 md:flex-none px-4 md:px-6 py-3 md:py-2 rounded-lg text-sm md:text-xs font-bold bg-white text-black transition shadow-sm">RAW SELECTION</button>
                    <button onclick="switchTab('edited')" id="eb" class="flex-1 md:flex-none px-4 md:px-6 py-3 md:py-2 rounded-lg text-sm md:text-xs font-bold text-zinc-400 hover:text-white transition">FINAL EDITS</button>
                </div>
            </div>
        </div>

        <div id="download-all-container" class="hidden flex justify-center md:justify-end mb-8 w-full">
            <a id="download-all-link" href="#" target="_blank" class="w-full md:w-auto text-center bg-blue-600 text-white px-8 py-4 md:py-3 rounded-xl text-sm md:text-xs font-black tracking-widest hover:bg-blue-500 transition shadow-lg shadow-blue-900/50">
                ↓ DOWNLOAD
            </a>
        </div>

        <div id="submitted-banner" class="hidden bg-green-900/40 border border-green-500 text-green-400 p-4 rounded-xl mb-8 text-center font-bold text-sm tracking-widest uppercase">
            </div>

        <div id="gallery" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-3 md:gap-4"></div>
    </div>

    <div id="preview-view" class="hidden max-w-7xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 border-b border-zinc-800 pb-6 gap-4">
            <h2 class="text-3xl md:text-4xl font-black italic tracking-tighter text-blue-400 text-center md:text-left">REVIEW NEW SELECTIONS</h2>
            <button onclick="togglePreview(false)" class="text-sm md:text-xs font-bold text-zinc-400 hover:text-white bg-zinc-900 px-6 py-3 rounded-lg w-full md:w-auto">← BACK TO GALLERY</button>
        </div>
        <p class="text-zinc-400 mb-8 text-base md:text-sm text-center md:text-left px-2">Please review your new choices below. Once submitted, these specific photos will be locked.</p>
        <div id="preview-gallery" class="grid grid-cols-3 md:grid-cols-5 lg:grid-cols-6 gap-2 md:gap-3 mb-10"></div>
        <div class="flex justify-center mb-20 px-4">
            <button onclick="submitSelections()" class="w-full md:w-auto bg-blue-600 text-white px-6 md:px-10 py-5 md:py-4 rounded-xl text-sm font-black tracking-widest hover:bg-blue-500 transition shadow-lg shadow-blue-900/50">
                CONFIRM & SUBMIT TO PHOTOGRAPHER
            </button>
        </div>
    </div>

    <div id="action-bar" class="fixed bottom-0 left-0 w-full bg-zinc-900/95 backdrop-blur-md border-t border-zinc-800 p-4 md:p-6 transform translate-y-full transition-transform duration-300 flex justify-center z-50 shadow-[0_-10px_40px_rgba(0,0,0,0.5)]">
        <button onclick="togglePreview(true)" class="w-full md:w-auto bg-white text-black px-6 md:px-10 py-4 md:py-3 rounded-xl text-sm md:text-xs font-black tracking-widest hover:bg-zinc-200 transition shadow-lg">
            REVIEW & SUBMIT NEW SELECTIONS →
        </button>
    </div>

    <script>
        const secret = new URLSearchParams(window.location.search).get('s');
        let photos = [], mode = 'raw', limit = 0, selectedCount = 0, projectData = null;
        let isSubmitted = false;

        async function init() {
            const res = await fetch(`/api/get-client-gallery?secret=${secret}`);
            if(!res.ok) return document.body.innerHTML = "<div class='flex flex-col items-center justify-center h-screen px-4 text-center'><h1 class='text-2xl md:text-3xl font-black text-zinc-600 uppercase tracking-widest mb-2'>Link Inactive</h1><p class='text-zinc-500 text-sm md:text-base'>This gallery has been archived or does not exist.</p></div>";
            
            const data = await res.json();
            projectData = data.project;
            isSubmitted = projectData[5] === 'submitted'; 
            
            document.getElementById('cn').innerText = projectData[1].toUpperCase();
            limit = projectData[2];
            document.getElementById('sel-limit').innerText = limit;
            
            // SMART LOCKING: Any photo that was already selected when the page loaded is marked as 'locked'
            photos = data.photos.map(p => ({
                ...p,
                locked: isSubmitted && p.selected 
            }));
            
            updateCounter();
            switchTab('raw'); 
        }

        function updateCounter() {
            selectedCount = photos.filter(p => p.selected && !p.edited).length;
            const newSelections = photos.filter(p => p.selected && !p.locked && !p.edited).length;

            const countEl = document.getElementById('sel-count');
            countEl.innerText = selectedCount;
            countEl.className = selectedCount >= limit ? "font-bold text-green-400 text-xl md:text-lg" : "font-bold text-white text-xl md:text-lg";
            
            // Handle Banner Text
            const banner = document.getElementById('submitted-banner');
            if (isSubmitted) {
                banner.classList.remove('hidden');
                if (selectedCount < limit) {
                    banner.innerText = `✓ ${selectedCount} Selections submitted. You can still select ${limit - selectedCount} more.`;
                } else {
                    banner.innerText = `✓ All ${limit} selections have been locked and submitted.`;
                }
            }

            // Show Action bar ONLY if there are brand new selections to submit
            const actionBar = document.getElementById('action-bar');
            if (newSelections > 0 && mode === 'raw') {
                actionBar.classList.remove('translate-y-full');
            } else {
                actionBar.classList.add('translate-y-full');
            }
        }

        async function toggleSelect(db_id) {
            if (mode === 'edited') return; 
            
            const photo = photos.find(p => p.db_id === db_id);
            
            if (photo.locked) {
                alert("This specific photo has already been submitted and locked.");
                return;
            }

            if (!photo.selected && selectedCount >= limit) {
                alert(`You have reached your total limit of ${limit} photos.`);
                return;
            }

            photo.selected = !photo.selected;
            updateCounter(); render();

            await fetch('/api/toggle-selection', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ secret: secret, photo_id: db_id, selected: photo.selected })
            });
        }

        function render() {
            const grid = document.getElementById('gallery'); grid.innerHTML = '';
            const filtered = photos.filter(p => mode === 'edited' ? p.edited : !p.edited);
            
            if(filtered.length === 0) {
                grid.innerHTML = `<div class="col-span-full py-32 text-center text-zinc-600 font-bold tracking-widest text-sm uppercase px-4">No photos available yet.</div>`;
            }

            filtered.forEach(p => {
                const div = document.createElement('div');
                const lockedStyle = (p.locked && mode === 'raw') ? 'opacity-50' : '';
                
                div.className = `relative group aspect-square bg-zinc-900 rounded-xl overflow-hidden cursor-pointer border-4 transition-all ${p.selected && mode === 'raw' ? 'border-green-500 scale-[0.96]' : 'border-transparent hover:border-zinc-700'} ${lockedStyle}`;
                div.onclick = () => toggleSelect(p.db_id);

                // If locked, show padlock. If selected, show checkmark.
                const icon = p.locked ? '🔒' : '<svg class="w-5 h-5 md:w-6 md:h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>';

                div.innerHTML = `
                    <img src="${p.url}" class="w-full h-full object-cover">
                    ${mode === 'raw' ? `
                        <div class="absolute top-2 md:top-3 right-2 md:right-3 w-8 h-8 md:w-10 md:h-10 rounded-full border-2 border-white flex items-center justify-center transition-colors ${p.selected ? 'bg-green-500 border-green-500' : 'bg-black/40'}">
                            ${p.selected ? icon : ''}
                        </div>
                    ` : ''}
                `;
                grid.appendChild(div);
            });
        }

        function togglePreview(show) {
            const mainView = document.getElementById('main-view');
            const previewView = document.getElementById('preview-view');
            const actionBar = document.getElementById('action-bar');
            
            if (show) {
                mainView.classList.add('hidden');
                actionBar.classList.add('translate-y-full'); 
                previewView.classList.remove('hidden');
                
                // Only show newly selected photos in the preview
                const previewGrid = document.getElementById('preview-gallery');
                previewGrid.innerHTML = photos.filter(p => p.selected && !p.locked && !p.edited).map(p => `
                    <div class="aspect-square bg-zinc-900 rounded-lg overflow-hidden border-2 border-green-500">
                        <img src="${p.url}" class="w-full h-full object-cover">
                    </div>
                `).join('');
                window.scrollTo(0,0);
            } else {
                mainView.classList.remove('hidden');
                previewView.classList.add('hidden');
                updateCounter(); 
            }
        }

        async function submitSelections() {
            if(!confirm("Are you sure? This will lock these choices and notify the photographer.")) return;
            
            await fetch('/api/submit-selections', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ secret: secret })
            });
            window.location.reload();
        }

        function switchTab(newMode) {
            mode = newMode;
            document.getElementById('rb').className = mode === 'raw' ? 'flex-1 md:flex-none px-4 md:px-6 py-3 md:py-2 rounded-lg text-sm md:text-xs font-bold bg-white text-black transition shadow-sm' : 'flex-1 md:flex-none px-4 md:px-6 py-3 md:py-2 rounded-lg text-sm md:text-xs font-bold text-zinc-400 hover:text-white transition bg-transparent';
            document.getElementById('eb').className = mode === 'edited' ? 'flex-1 md:flex-none px-4 md:px-6 py-3 md:py-2 rounded-lg text-sm md:text-xs font-bold bg-white text-black transition shadow-sm' : 'flex-1 md:flex-none px-4 md:px-6 py-3 md:py-2 rounded-lg text-sm md:text-xs font-bold text-zinc-400 hover:text-white transition bg-transparent';
            
            document.getElementById('counter-box').style.opacity = mode === 'raw' ? '1' : '0.2';
            
            const dlContainer = document.getElementById('download-all-container');
            const dlLink = document.getElementById('download-all-link');
            
            dlContainer.classList.remove('hidden');

            if (mode === 'edited' && projectData && projectData[3]) {
                dlLink.href = `https://drive.google.com/drive/folders/${projectData[3]}`;
            } else if (mode === 'raw' && projectData && projectData[4]) {
                dlLink.href = `https://drive.google.com/drive/folders/${projectData[4]}`;
            } else {
                dlContainer.classList.add('hidden');
            }
            
            updateCounter(); 
            render();
        }

        init();
    </script>
</body>
</html>
