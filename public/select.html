<!DOCTYPE html>
<html class="bg-black text-white">
<head><title>YOUR GALLERY | GULUGULU</title><script src="https://cdn.tailwindcss.com"></script></head>
<body class="p-4">
    <div class="flex justify-between items-center mb-8 border-b border-zinc-800 pb-4">
        <h1 id="cn" class="font-black italic text-2xl tracking-tighter">GULUGULU PICS</h1>
        <div class="flex gap-6">
            <button onclick="mode='raw';render()" id="rb" class="text-xs border-b-2 border-white pb-1 tracking-widest font-bold">RAW</button>
            <button onclick="mode='edited';render()" id="eb" class="text-xs text-zinc-500 tracking-widest font-bold">EDITED</button>
        </div>
    </div>
    <div id="gallery" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-2"></div>

    <script>
        const secret = new URLSearchParams(window.location.search).get('s');
        let photos = [], mode = 'raw';

        async function init() {
            const res = await fetch(`/api/get-client-gallery?secret=${secret}`);
            const data = await res.json();
            document.getElementById('cn').innerText = data.project[1].toUpperCase();
            photos = data.photos; render();
        }

        function render() {
            const grid = document.getElementById('gallery'); grid.innerHTML = '';
            photos.filter(p => mode === 'edited' ? p.edited : !p.edited).forEach(p => {
                const div = document.createElement('div');
                div.className = "relative group aspect-square bg-zinc-900 rounded overflow-hidden";
                div.innerHTML = `<img src="${p.url}" class="w-full h-full object-cover">
                    <a href="https://drive.google.com/uc?export=download&id=${p.id}" class="absolute bottom-2 right-2 bg-black/80 px-2 py-1 text-[8px] rounded opacity-0 group-hover:opacity-100 font-bold">DOWNLOAD ORIGINAL</a>`;
                grid.appendChild(div);
            });
            document.getElementById('rb').className = mode === 'raw' ? 'text-xs border-b-2 border-white pb-1 font-bold' : 'text-xs text-zinc-500 font-bold';
            document.getElementById('eb').className = mode === 'edited' ? 'text-xs border-b-2 border-white pb-1 font-bold' : 'text-xs text-zinc-500 font-bold';
        }
        init();
    </script>
</body>
</html>
