<!DOCTYPE html>
<html class="bg-zinc-950 text-white min-h-screen">
<head>
    <meta charset="UTF-8">
    <title>YOUR GALLERY | GULUGULU</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="p-4 md:p-10 pb-24">
    
    <div class="max-w-7xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 border-b border-zinc-800 pb-8 gap-6">
            <h1 id="cn" class="font-black italic text-4xl tracking-tighter">GULUGULU PICS</h1>
            
            <div class="flex flex-col items-end gap-4">
                <div id="counter-box" class="bg-zinc-900 border border-zinc-800 px-5 py-2.5 rounded-xl text-sm font-mono shadow-inner transition-opacity">
                    Selected: <span id="sel-count" class="font-bold text-white text-lg">0</span> <span class="text-zinc-500">/</span> <span id="sel-limit" class="text-zinc-400">0</span>
                </div>
                
                <div class="flex gap-2 bg-zinc-900 p-1 rounded-xl border border-zinc-800">
                    <button onclick="switchTab('raw')" id="rb" class="px-6 py-2 rounded-lg text-xs font-bold bg-white text-black transition shadow-sm">RAW SELECTION</button>
                    <button onclick="switchTab('edited')" id="eb" class="px-6 py-2 rounded-lg text-xs font-bold text-zinc-400 hover:text-white transition">FINAL EDITS</button>
                </div>
            </div>
        </div>

        <div id="download-all-container" class="hidden flex justify-end mb-6">
            <a id="download-all-link" href="#" target="_blank" class="bg-blue-600 text-white px-6 py-3 rounded-xl text-xs font-black tracking-widest hover:bg-blue-500 transition shadow-lg shadow-blue-900/50">
                ↓ DOWNLOAD ALL (ZIP)
            </a>
        </div>

        <div id="gallery" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4"></div>
    </div>

    <script>
        const secret = new URLSearchParams(window.location.search).get('s');
        let photos = [], mode = 'raw', limit = 0, selectedCount = 0, projectData = null;

        async function init() {
            const res = await fetch(`/api/get-client-gallery?secret=${secret}`);
            if(!res.ok) return document.body.innerHTML = "<div class='flex items-center justify-center h-screen'><h1 class='text-2xl font-bold text-zinc-600 uppercase tracking-widest'>Link Invalid or Expired</h1></div>";
            
            const data = await res.json();
            projectData = data.project;
            document.getElementById('cn').innerText = projectData[1].toUpperCase();
            limit = projectData[2];
            document.getElementById('sel-limit').innerText = limit;
            photos = data.photos; 
            
            updateCounter();
            switchTab('raw'); // Initialize tab rendering safely
        }

        function updateCounter() {
            selectedCount = photos.filter(p => p.selected && !p.edited).length;
            const countEl = document.getElementById('sel-count');
            countEl.innerText = selectedCount;
            countEl.className = selectedCount >= limit ? "font-bold text-green-400 text-lg" : "font-bold text-white text-lg";
        }

        async function toggleSelect(db_id) {
            if (mode === 'edited') return;
            const photo = photos.find(p => p.db_id === db_id);
            if (!photo.selected && selectedCount >= limit) {
                alert(`You have reached your limit of ${limit} photos.`);
                return;
            }

            photo.selected = !photo.selected;
            updateCounter(); render();

            await fetch('/api/toggle-selection', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ secret: secret, photo_id: db_id, selected: photo.selected })
            });
        }

        function render() {
            const grid = document.getElementById('gallery'); grid.innerHTML = '';
            const filtered = photos.filter(p => mode === 'edited' ? p.edited : !p.edited);
            
            if(filtered.length === 0) {
                grid.innerHTML = `<div class="col-span-full py-32 text-center text-zinc-600 font-bold tracking-widest text-sm uppercase">No photos available yet.</div>`;
            }

            filtered.forEach(p => {
                const div = document.createElement('div');
                div.className = `relative group aspect-square bg-zinc-900 rounded-xl overflow-hidden cursor-pointer border-4 transition-all ${p.selected && mode === 'raw' ? 'border-green-500 scale-[0.98]' : 'border-transparent hover:border-zinc-700'}`;
                div.onclick = () => toggleSelect(p.db_id);

                div.innerHTML = `
                    <img src="${p.url}" class="w-full h-full object-cover">
                    ${mode === 'raw' ? `
                        <div class="absolute top-3 right-3 w-8 h-8 rounded-full border-2 border-white flex items-center justify-center transition-colors ${p.selected ? 'bg-green-500 border-green-500' : 'bg-black/40'}">
                            ${p.selected ? '<svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>' : ''}
                        </div>
                    ` : ''}
                    <a href="https://drive.google.com/uc?export=download&id=${p.id}" download onclick="event.stopPropagation()" class="absolute bottom-3 right-3 bg-white/90 text-black px-3 py-1.5 text-[10px] rounded-lg opacity-0 group-hover:opacity-100 font-black hover:bg-white transition shadow-lg">
                        SAVE
                    </a>
                `;
                grid.appendChild(div);
            });
        }

        function switchTab(newMode) {
            mode = newMode;
            document.getElementById('rb').className = mode === 'raw' ? 'px-6 py-2 rounded-lg text-xs font-bold bg-white text-black transition shadow-sm' : 'px-6 py-2 rounded-lg text-xs font-bold text-zinc-400 hover:text-white transition';
            document.getElementById('eb').className = mode === 'edited' ? 'px-6 py-2 rounded-lg text-xs font-bold bg-white text-black transition shadow-sm' : 'px-6 py-2 rounded-lg text-xs font-bold text-zinc-400 hover:text-white transition';
            
            document.getElementById('counter-box').style.opacity = mode === 'raw' ? '1' : '0.2';
            
            const dlContainer = document.getElementById('download-all-container');
            const dlLink = document.getElementById('download-all-link');
            
            dlContainer.classList.remove('hidden');

            if (mode === 'edited' && projectData && projectData[3]) {
                dlLink.href = `https://drive.google.com/drive/folders/${projectData[3]}`;
                dlLink.innerText = "↓ DOWNLOAD ALL EDITS (ZIP)";
                dlLink.className = "bg-blue-600 text-white px-6 py-3 rounded-xl text-xs font-black tracking-widest hover:bg-blue-500 transition shadow-lg shadow-blue-900/50";
            } else if (mode === 'raw' && projectData && projectData[4]) {
                dlLink.href = `https://drive.google.com/drive/folders/${projectData[4]}`;
                dlLink.innerText = "↓ DOWNLOAD ALL RAWS (ZIP)";
                dlLink.className = "bg-zinc-800 text-white px-6 py-3 rounded-xl text-xs font-black tracking-widest hover:bg-zinc-700 transition shadow-lg shadow-black/50 border border-zinc-700";
            } else {
                dlContainer.classList.add('hidden');
            }
            
            render();
        }

        init();
    </script>
</body>
</html>
