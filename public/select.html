<!DOCTYPE html>
<html>
<head>
    <title>Your Gallery | Gulugulu Pics</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white">
    <div class="sticky top-0 bg-zinc-900 p-4 flex justify-between items-center z-50">
        <h1 id="title" class="font-bold">Loading...</h1>
        <div class="flex items-center gap-4">
            <span class="text-orange-500 font-bold"><span id="curr">0</span>/<span id="max">0</span> Selected</span>
            <button onclick="save()" class="bg-white text-black px-4 py-1 rounded-full font-bold">Submit</button>
        </div>
    </div>

    <div id="grid" class="grid grid-cols-2 md:grid-cols-4 gap-2 p-2"></div>

    <script>
        const pid = new URLSearchParams(window.location.search).get('id');
        let limit = 0; let selected = [];

        async function load() {
            const res = await fetch(`/api/get-gallery?id=${pid}`);
            const data = await res.json();
            limit = data.limit;
            document.getElementById('title').innerText = data.client_name;
            document.getElementById('max').innerText = limit;

            const grid = document.getElementById('grid');
            data.photos.forEach(p => {
                const div = document.createElement('div');
                div.className = "relative group aspect-square bg-zinc-800";
                div.innerHTML = `
                    <img src="${p.thumb}" class="w-full h-full object-cover cursor-pointer hover:opacity-75 transition" onclick="tgl(this, '${p.drive_id}')">
                    <a href="https://drive.google.com/uc?export=download&id=${p.drive_id}" target="_blank" class="absolute bottom-2 left-2 bg-black/50 p-1 rounded text-[10px]">Download Original</a>
                `;
                grid.appendChild(div);
            });
        }

        function tgl(el, id) {
            const i = selected.indexOf(id);
            if (i > -1) {
                selected.splice(i, 1);
                el.parentElement.style.border = "none";
            } else if (selected.length < limit) {
                selected.push(id);
                el.parentElement.style.border = "4px solid orange";
            } else {
                alert("Limit reached!");
            }
            document.getElementById('curr').innerText = selected.length;
        }

        async function save() {
            await fetch('/api/submit-selection', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ project_id: pid, selections: selected })
            });
            alert("Selections Saved!");
        }
        load();
    </script>
</body>
</html>
