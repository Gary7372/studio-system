<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GULUGULU PICS | STUDIO ADMIN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-zinc-50 text-zinc-900 p-4 md:p-8 min-h-screen">
    <div class="max-w-6xl mx-auto">
        
        <header class="flex flex-col md:flex-row justify-between items-center mb-12 gap-6 bg-white p-6 rounded-2xl shadow-sm border border-zinc-200">
            <div>
                <h1 class="text-3xl font-black italic tracking-tighter">GULUGULU PICS</h1>
                <p class="text-xs text-zinc-500 font-bold uppercase tracking-widest mt-1">Control Center</p>
            </div>
            <div class="flex flex-wrap gap-3">
                <button onclick="syncMaster()" id="syncBtn" class="bg-blue-50 text-blue-600 border border-blue-200 px-5 py-2.5 rounded-xl text-xs font-bold hover:bg-blue-100 transition">↻ MASTER SYNC</button>
                <button onclick="load(false)" id="tab-active" class="bg-zinc-900 text-white px-5 py-2.5 rounded-xl text-xs font-bold transition">ACTIVE</button>
                <button onclick="load(true)" id="tab-vault" class="bg-white text-zinc-400 border border-zinc-200 px-5 py-2.5 rounded-xl text-xs font-bold hover:text-black transition">VAULT</button>
                <button onclick="createProject()" class="bg-blue-600 text-white px-6 py-2.5 rounded-xl text-xs font-black shadow-md hover:bg-blue-700 transition">+ NEW SHOOT</button>
            </div>
        </header>

        <div id="projectGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </div>

    <script>
        let currentViewIsArchived = false;

        async function load(archived = false) {
            currentViewIsArchived = archived;
            document.getElementById('tab-active').className = !archived ? "bg-zinc-900 text-white px-5 py-2.5 rounded-xl text-xs font-bold" : "bg-white text-zinc-400 border border-zinc-200 px-5 py-2.5 rounded-xl text-xs font-bold hover:text-black";
            document.getElementById('tab-vault').className = archived ? "bg-zinc-900 text-white px-5 py-2.5 rounded-xl text-xs font-bold" : "bg-white text-zinc-400 border border-zinc-200 px-5 py-2.5 rounded-xl text-xs font-bold hover:text-black";

            const res = await fetch(`/api/list-projects?archived=${archived}`);
            const data = await res.json();

            document.getElementById('projectGrid').innerHTML = data.map(p => `
                <div class="bg-white p-6 rounded-3xl border border-zinc-200 shadow-sm hover:shadow-lg transition-all duration-300 relative group">
                    
                    <div class="flex justify-between items-start mb-4">
                        <h2 class="text-xl font-black uppercase leading-tight w-2/3 truncate">${p.name}</h2>
                        <div class="flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                            <button onclick="toggleArchive('${p.id}', ${!archived})" class="text-[10px] bg-zinc-100 px-2 py-1 rounded font-bold text-zinc-600 hover:text-black">${archived ? 'RESTORE' : 'ARCHIVE'}</button>
                            <button onclick="deleteProject('${p.id}')" class="text-[10px] bg-red-50 px-2 py-1 rounded font-bold text-red-500 hover:bg-red-500 hover:text-white transition">DELETE</button>
                        </div>
                    </div>

                    <a href="https://drive.google.com/drive/folders/${p.folder}" target="_blank" class="inline-flex items-center gap-1 text-[10px] font-bold text-blue-600 bg-blue-50 px-2 py-1 rounded-md mb-5 hover:bg-blue-100">
                        OPEN IN GOOGLE DRIVE ↗
                    </a>
                    
                    <div class="bg-zinc-50 p-4 rounded-2xl mb-5 border border-zinc-100">
                        <div class="flex justify-between items-center mb-3">
                            <span class="text-[10px] font-bold text-zinc-400 uppercase tracking-widest">Client Selections</span>
                            <div class="flex items-center gap-2">
                                <span class="text-sm font-black ${p.selected >= p.limit ? 'text-green-500' : 'text-zinc-800'}">${p.selected} / ${p.limit}</span>
                                <button onclick="editLimit('${p.id}', '${p.limit}')" class="text-[9px] bg-zinc-200 px-2 py-1 rounded font-bold text-zinc-600 hover:text-black hover:bg-zinc-300 transition">EDIT LIMIT</button>
                            </div>
                        </div>
                        ${p.selected > 0 ? `<button onclick="copySelections('${p.id}')" class="w-full text-[10px] text-zinc-700 font-bold border border-zinc-300 bg-white py-2 rounded-lg hover:border-black transition">📋 COPY LIGHTROOM LIST</button>` : ''}
                    </div>

                    <div class="grid grid-cols-2 gap-2 mb-4">
                        <button onclick="syncProjectFiles('${p.id}','${p.folder}', false)" class="bg-zinc-100 border border-zinc-200 text-[10px] py-3 rounded-xl font-black text-zinc-600 hover:bg-zinc-200 transition">↻ SYNC RAWS</button>
                        <button onclick="syncProjectFiles('${p.id}','${p.folder}', true)" class="bg-zinc-900 text-white text-[10px] py-3 rounded-xl font-black hover:bg-zinc-800 transition shadow-md">↻ SYNC EDITS</button>
                    </div>

                    <div class="flex items-center gap-2 bg-zinc-50 p-2 rounded-xl border border-zinc-100">
                        <input type="text" readonly value="${window.location.origin}/select.html?s=${p.secret}" class="text-[9px] text-zinc-500 font-mono bg-transparent w-full outline-none px-2">
                        <button onclick="navigator.clipboard.writeText('${window.location.origin}/select.html?s=${p.secret}'); alert('Copied!');" class="text-[10px] font-bold text-black bg-white border border-zinc-200 px-3 py-1.5 rounded-lg hover:border-black transition shadow-sm">COPY</button>
                    </div>
                </div>
            `).join('');
        }

        async function createProject() {
            const name = prompt("Client Name?");
            if (!name) return;
            const limit = prompt("Selection Limit?", "25");
            await fetch('/api/create-project', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name, limit }) });
            load(false);
        }

        async function syncMaster() {
            const btn = document.getElementById('syncBtn'); btn.innerText = "SYNCING...";
            const res = await fetch('/api/sync-master-folders', { method: 'POST' });
            const data = await res.json();
            alert(data.status); btn.innerText = "↻ MASTER SYNC"; load(currentViewIsArchived);
        }

        async function deleteProject(pId) {
            if(!confirm("Are you sure? This deletes the project from the dashboard and ejects the Drive folder.")) return;
            await fetch('/api/delete-project', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ p_id: pId }) });
            load(currentViewIsArchived);
        }

        async function editLimit(pId, currentLimit) {
            const newLimit = prompt("Enter new total selection limit:", currentLimit);
            if(!newLimit || isNaN(newLimit) || newLimit === currentLimit) return;
            await fetch('/api/update-limit', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ p_id: pId, limit: newLimit }) });
            load(currentViewIsArchived);
        }

        async function syncProjectFiles(pId, fId, isEdited) {
            const btn = event.target; const origText = btn.innerText; btn.innerText = "SYNCING...";
            const res = await fetch('/api/sync-drive', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ p_id: pId, f_id: fId, is_edited: isEdited }) });
            const data = await res.json(); alert(`Synced! Added ${data.added} new photos.`); btn.innerText = origText; load(currentViewIsArchived);
        }

        async function copySelections(pId) {
            const res = await fetch(`/api/get-selections?p_id=${pId}`);
            const data = await res.json();
            navigator.clipboard.writeText(data.filenames.join(', '));
            alert("Copied! Paste directly into Lightroom search.");
        }

        async function toggleArchive(p_id, val) {
            await fetch('/api/archive-project', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ p_id, val }) }); load(!val);
        }

        load();
    </script>
</body>
</html>
