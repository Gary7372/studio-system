<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GULUGULU PICS | ADMIN</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-100 p-8 font-sans">
    <div class="max-w-5xl mx-auto">
        <header class="flex justify-between items-center mb-10">
            <div>
                <h1 class="text-4xl font-black italic tracking-tighter">GULUGULU PICS</h1>
            </div>
            <div class="flex gap-2">
                <button onclick="load(false)" id="tab-active" class="text-xs font-bold px-4 py-2 bg-black text-white rounded-lg">ACTIVE</button>
                <button onclick="load(true)" id="tab-vault" class="text-xs text-zinc-400 font-bold px-4 py-2 hover:text-black">VAULT</button>
                <button onclick="createProject()" class="bg-blue-600 text-white px-6 py-2 rounded-lg text-xs font-black ml-4">+ NEW SHOOT</button>
            </div>
        </header>

        <div id="projectGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </div>

    <script>
        let currentViewIsArchived = false;

        async function load(archived = false) {
            currentViewIsArchived = archived;
            document.getElementById('tab-active').className = !archived ? "text-xs font-bold px-4 py-2 bg-black text-white rounded-lg" : "text-xs text-zinc-400 font-bold px-4 py-2";
            document.getElementById('tab-vault').className = archived ? "text-xs font-bold px-4 py-2 bg-black text-white rounded-lg" : "text-xs text-zinc-400 font-bold px-4 py-2";

            const res = await fetch(`/api/list-projects?archived=${archived}`);
            const data = await res.json();

            document.getElementById('projectGrid').innerHTML = data.map(p => `
                <div class="bg-white p-6 rounded-3xl border border-zinc-200 shadow-sm relative">
                    <button onclick="toggleArchive('${p.id}', ${!archived})" class="absolute top-4 right-4 text-[10px] text-zinc-300 font-black hover:text-orange-500">${archived ? 'RESTORE' : 'ARCHIVE'}</button>
                    
                    <h2 class="text-lg font-black uppercase leading-tight w-3/4 truncate">${p.name}</h2>
                    
                    <div class="mt-4 mb-6 bg-zinc-50 p-3 rounded-lg flex justify-between items-center border border-zinc-100">
                        <span class="text-[10px] font-bold text-zinc-500 uppercase">Selections</span>
                        <span class="text-sm font-black ${p.selected >= p.limit ? 'text-green-600' : 'text-blue-600'}">${p.selected} / ${p.limit}</span>
                    </div>

                    <div class="grid grid-cols-2 gap-2 mb-4">
                        <button onclick="syncProjectFiles('${p.id}','${p.folder}', false)" class="bg-zinc-100 border border-zinc-200 text-[10px] py-2.5 rounded-xl font-black hover:bg-zinc-200 transition">↻ SYNC RAWS</button>
                        <button onclick="syncProjectFiles('${p.id}','${p.folder}', true)" class="bg-zinc-900 text-white text-[10px] py-2.5 rounded-xl font-black hover:bg-zinc-800 transition">↻ SYNC EDITS</button>
                    </div>

                    ${p.selected > 0 ? `<button onclick="copySelections('${p.id}')" class="w-full mb-4 text-[10px] text-blue-600 font-bold border border-blue-200 bg-blue-50 py-2 rounded-lg hover:bg-blue-100">COPY LIGHTROOM LIST</button>` : ''}

                    <div class="flex items-center gap-2 bg-zinc-50 p-2 rounded-xl border border-zinc-100">
                        <code class="text-[9px] text-zinc-500 font-mono truncate flex-1">${window.location.origin}/select.html?s=${p.secret}</code>
                        <button onclick="navigator.clipboard.writeText('${window.location.origin}/select.html?s=${p.secret}'); alert('Copied!');" class="text-[9px] font-bold text-black hover:text-blue-600">COPY</button>
                    </div>
                </div>
            `).join('');
        }

        async function createProject() {
            const name = prompt("Client Name?");
            if (!name) return;
            const limit = prompt("How many photos can they select?", "20");
            await fetch('/api/create-project', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, limit })
            });
            load(false);
        }

        async function syncProjectFiles(pId, fId, isEdited) {
            const btn = event.target;
            btn.innerText = "Syncing...";
            const res = await fetch('/api/sync-drive', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ p_id: pId, f_id: fId, is_edited: isEdited })
            });
            const data = await res.json();
            if(data.error) alert(data.error);
            else alert(`Synced successfully! Found ${data.added} new photos.`);
            load(currentViewIsArchived);
        }

        async function copySelections(pId) {
            const res = await fetch(`/api/get-selections?p_id=${pId}`);
            const data = await res.json();
            const filenameString = data.filenames.join(', ');
            navigator.clipboard.writeText(filenameString);
            alert("Copied! Paste this directly into the Lightroom search bar.");
        }

        async function toggleArchive(p_id, val) {
            await fetch('/api/archive-project', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ p_id, val }) });
            load(!val);
        }

        load();
    </script>
</body>
</html>
